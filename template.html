<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Helmsman</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #08080a;
        --surface-2: #0b0b0e;
        --surface-inset: #0a0a0c;
        --surface-card: #101014;
        --surface-raised: #15151a;
        --surface-hover: #16161c;
        --surface-hover2: #1c1c22;
        --border-main: #18181d;
        --border-card: #1c1c22;
        --border-input: #26262d;
        --border-strong: #2e2e36;
        --border-inner: #16161b;
        --gridline: #1a1a1f;
        --text-primary: #f2f2f5;
        --text-body: #e7e7ec;
        --text-muted: #cfcfd6;
        --text-secondary: #9a9aa3;
        --text-tertiary: #7a7a83;
        --text-faint: #62626b;
        --text-ghost: #46464e;
        --text-mono-faint: #4a4a52;
        --on-accent: #08080a;
        --topbar: rgba(10, 10, 12, 0.82);
        --scrim: rgba(5, 5, 7, 0.6);
      }
      :root[data-theme="light"] {
        --bg: #eceef1;
        --surface-2: #ffffff;
        --surface-inset: #f4f5f7;
        --surface-card: #ffffff;
        --surface-raised: #f3f4f6;
        --surface-hover: #eef0f3;
        --surface-hover2: #e7e9ee;
        --border-main: #e4e6ea;
        --border-card: #e9eaee;
        --border-input: #d7d9df;
        --border-strong: #c6c9d1;
        --border-inner: #eef0f2;
        --gridline: #e9ebee;
        --text-primary: #16171b;
        --text-body: #24262b;
        --text-muted: #3d3f46;
        --text-secondary: #62646d;
        --text-tertiary: #82848d;
        --text-faint: #9a9ca5;
        --text-ghost: #b6b8bf;
        --text-mono-faint: #a4a6ae;
        --on-accent: #1f1206;
        --topbar: rgba(255, 255, 255, 0.82);
        --scrim: rgba(40, 42, 48, 0.34);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: var(--bg);
        color: var(--text-body);
        font-family: "Geist", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        font-feature-settings: "cv01", "ss01";
      }
      ::selection {
        background: rgba(251, 146, 60, 0.32);
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-input);
        border-radius: 6px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--border-strong);
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      input,
      button,
      textarea,
      select {
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
      }
      @keyframes dotPulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 var(--pc);
        }
        50% {
          box-shadow: 0 0 0 4px transparent;
        }
      }
      @keyframes ringPulse {
        0% {
          transform: scale(1);
          opacity: 0.7;
        }
        70%,
        100% {
          transform: scale(2.4);
          opacity: 0;
        }
      }
      @keyframes blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes modalPop {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.985);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes sheetUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: none;
        }
      }
      @keyframes drawerIn {
        from {
          transform: translateX(100%);
        }
        to {
          transform: none;
        }
      }
      @keyframes skel {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      .skel {
        background: linear-gradient(90deg, var(--surface-card) 25%, var(--surface-raised) 37%, var(--surface-card) 63%);
        background-size: 200% 100%;
        animation: skel 1.5s ease-in-out infinite;
        border-radius: 8px;
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // ─── handler registry ──────────────────────────────────────────────
      const H = {};
      let _hi = 0;
      function h(fn) {
        if (!fn) return "";
        const id = "h" + _hi++;
        H[id] = fn;
        return `data-h="${id}"`;
      }
      function hi(fn) {
        if (!fn) return "";
        const id = "h" + _hi++;
        H[id] = fn;
        return `data-hi="${id}"`;
      }
      function hf(fn) {
        if (!fn) return "";
        const id = "h" + _hi++;
        H[id] = fn;
        return `data-hf="${id}"`;
      }

      // ─── event delegation ──────────────────────────────────────────────
      document.addEventListener("click", (e) => {
        const el = e.target.closest("[data-h]");
        if (el) {
          const fn = H[el.dataset.h];
          if (fn) fn(e);
        }
      });
      document.addEventListener("input", (e) => {
        const el = e.target.closest("[data-hi]");
        if (el) {
          const fn = H[el.dataset.hi];
          if (fn) fn(e);
        }
      });
      document.addEventListener("submit", (e) => {
        const el = e.target.closest("[data-hf]");
        if (el) {
          e.preventDefault();
          const fn = H[el.dataset.hf];
          if (fn) fn(e);
        }
      });
      // hover via mouseover/mouseout
      document.addEventListener("mouseover", (e) => {
        const el = e.target.closest("[data-hov]");
        if (!el) return;
        el._baseStyle = el._baseStyle ?? el.getAttribute("style") ?? "";
        el.style.cssText = el._baseStyle + ";" + el.dataset.hov;
      });
      document.addEventListener("mouseout", (e) => {
        const el = e.target.closest("[data-hov]");
        if (!el) return;
        if (!el.contains(e.relatedTarget)) el.style.cssText = el._baseStyle ?? "";
      });

      // ─── STATUS / TYPE meta ────────────────────────────────────────────
      const STATUS = {
        running: { c: "#34d399", l: "Running", anim: false },
        building: { c: "#fbbf24", l: "Building", anim: true },
        queued: { c: "#fbbf24", l: "Queued", anim: true },
        deploying: { c: "#60a5fa", l: "Deploying", anim: true },
        restarting: { c: "#60a5fa", l: "Restarting", anim: true },
        stopped: { c: "var(--text-tertiary)", l: "Stopped", anim: false },
        failed: { c: "#f87171", l: "Failed", anim: false },
        exited: { c: "#f87171", l: "Exited", anim: false },
      };
      const TYPE = {
        git: { l: "Git", c: "var(--text-secondary)", icon: "⎇" },
        docker: { l: "Docker", c: "#60a5fa", icon: "❒" },
        template: { l: "Template", c: "#a78bfa", icon: "◆" },
      };
      function sdStatus(key) {
        const x = STATUS[key] || STATUS.stopped;
        return { color: x.c, label: x.l, anim: !!x.anim };
      }
      function sdType(key) {
        const x = TYPE[key] || TYPE.docker;
        return { label: x.l, color: x.c, icon: x.icon };
      }

      // ─── state ─────────────────────────────────────────────────────────
      let state = {
        view: "app",
        route: { screen: "dashboard" },
        appTab: "overview",
        tick: 0,
        width: window.innerWidth,
        sidebarCollapsed: false,
        drawerOpen: false,
        userMenuOpen: false,
        menuFor: null,
        addAppOpen: false,
        addAppTab: "git",
        addAppErr: {},
        addForm: {},
        newProjectOpen: false,
        npName: "",
        npErr: "",
        newEnvOpen: false,
        neName: "",
        neErr: "",
        confirm: null,
        buildDrawer: null,
        loading: false,
        logsFollow: true,
        logFilter: "",
        logSel: null,
        envDraft: null,
        setupUser: "",
        setupPass: "",
        setupError: "",
        loginUser: "",
        loginPass: "",
        loginError: "",
        theme: "dark",
        toasts: [],
        addTplReveal: false,
      };

      // ─── seed data ──────────────────────────────────────────────────────
      function seedHist(base, jit, n = 48, max = 100) {
        const a = [];
        let v = base;
        for (let i = 0; i < n; i++) {
          v += (Math.random() - 0.5) * jit;
          v = Math.max(2, Math.min(max, v));
          a.push(v);
        }
        return a;
      }
      function mkApp(o) {
        return Object.assign(
          { cpuHist: seedHist(o.cpu || 8, 6, 48), memHist: seedHist(o.mem || 120, 24, 48, o.memLimit || 512), env: [], deployments: [], logs: [] },
          o,
        );
      }
      let model = (function () {
        const sfw = mkApp({
          id: "sf-web",
          name: "web",
          type: "git",
          status: "running",
          repo: "github.com/acme/storefront",
          branch: "main",
          dockerfile: "Dockerfile",
          container: "storefront-production-web",
          cpu: 14,
          mem: 198,
          memLimit: 512,
          ports: [{ host: 8080, container: 3000, proto: "TCP" }],
        });
        sfw.env = [
          { key: "NODE_ENV", value: "production", secret: false },
          { key: "PORT", value: "3000", secret: false },
          { key: "DATABASE_URL", value: "postgres://app:s3cr3t@postgres:5432/store", secret: true },
          { key: "SESSION_SECRET", value: "a91f2c0bd4e7", secret: true },
          { key: "LOG_LEVEL", value: "info", secret: false },
        ];
        sfw.deployments = [
          { id: "d1", status: "running", tag: "sha-9f3c1a2", trigger: "push · main", started: "Jun 27 09:42", finished: "Jun 27 09:44", dur: "1m 58s" },
          { id: "d2", status: "exited", tag: "sha-7b1e004", trigger: "push · main", started: "Jun 26 17:10", finished: "Jun 26 17:12", dur: "2m 04s" },
          { id: "d3", status: "running", tag: "sha-44ade19", trigger: "manual", started: "Jun 26 11:23", finished: "Jun 26 11:25", dur: "1m 51s" },
          { id: "d4", status: "failed", tag: "sha-21c0f8b", trigger: "push · main", started: "Jun 25 22:01", finished: "Jun 25 22:02", dur: "47s" },
        ];
        const sfa = mkApp({
          id: "sf-api",
          name: "api",
          type: "git",
          status: "running",
          repo: "github.com/acme/storefront-api",
          branch: "main",
          dockerfile: "docker/Dockerfile",
          container: "storefront-production-api",
          cpu: 22,
          mem: 312,
          memLimit: 768,
          ports: [{ host: 8081, container: 4000, proto: "TCP" }],
        });
        sfa.env = [
          { key: "NODE_ENV", value: "production", secret: false },
          { key: "DATABASE_URL", value: "postgres://app:s3cr3t@postgres:5432/store", secret: true },
          { key: "REDIS_URL", value: "redis://redis:6379", secret: false },
        ];
        const sfpg = mkApp({
          id: "sf-pg",
          name: "postgres",
          type: "template",
          status: "running",
          image: "postgres:16-alpine",
          container: "storefront-production-postgres",
          cpu: 6,
          mem: 142,
          memLimit: 1024,
          ports: [{ host: 5433, container: 5432, proto: "TCP" }],
        });
        sfpg.env = [
          { key: "POSTGRES_USER", value: "app", secret: false },
          { key: "POSTGRES_PASSWORD", value: "s3cr3t-pg-pw", secret: true },
          { key: "POSTGRES_DB", value: "store", secret: false },
        ];
        const sfr = mkApp({
          id: "sf-redis",
          name: "redis",
          type: "docker",
          status: "running",
          image: "redis:7-alpine",
          container: "storefront-production-redis",
          cpu: 3,
          mem: 38,
          memLimit: 256,
          ports: [{ host: 6380, container: 6379, proto: "TCP" }],
        });
        const sfsw = mkApp({
          id: "sfs-web",
          name: "web",
          type: "git",
          status: "building",
          repo: "github.com/acme/storefront",
          branch: "develop",
          dockerfile: "Dockerfile",
          container: "storefront-staging-web",
          cpu: 9,
          mem: 96,
          memLimit: 512,
          ports: [{ host: 8090, container: 3000, proto: "TCP" }],
        });
        const sfspg = mkApp({
          id: "sfs-pg",
          name: "postgres",
          type: "template",
          status: "running",
          image: "postgres:16-alpine",
          container: "storefront-staging-postgres",
          cpu: 4,
          mem: 118,
          memLimit: 512,
          ports: [{ host: 5434, container: 5432, proto: "TCP" }],
        });
        const ang = mkApp({
          id: "an-graf",
          name: "grafana",
          type: "docker",
          status: "running",
          image: "grafana/grafana:11.1.0",
          container: "analytics-production-grafana",
          cpu: 11,
          mem: 176,
          memLimit: 512,
          ports: [{ host: 3001, container: 3000, proto: "TCP" }],
        });
        const anch = mkApp({
          id: "an-ch",
          name: "clickhouse",
          type: "docker",
          status: "stopped",
          image: "clickhouse/clickhouse-server:24.6",
          container: "analytics-production-clickhouse",
          cpu: 0,
          mem: 0,
          memLimit: 2048,
          ports: [
            { host: 8123, container: 8123, proto: "TCP" },
            { host: 9000, container: 9000, proto: "TCP" },
          ],
        });
        const aning = mkApp({
          id: "an-ing",
          name: "ingest",
          type: "git",
          status: "failed",
          repo: "github.com/acme/ingest",
          branch: "main",
          dockerfile: "Dockerfile",
          container: "analytics-production-ingest",
          cpu: 0,
          mem: 0,
          memLimit: 512,
          ports: [{ host: 7070, container: 7070, proto: "TCP" }],
        });
        aning.deployments = [
          { id: "i1", status: "failed", tag: "sha-0c19a7f", trigger: "push · main", started: "Jun 27 08:14", finished: "Jun 27 08:14", dur: "31s" },
          { id: "i2", status: "running", tag: "sha-bb2740d", trigger: "manual", started: "Jun 24 14:02", finished: "Jun 24 14:04", dur: "1m 40s" },
        ];
        return {
          host: {
            cpu: seedHist(34, 12, 48),
            ram: seedHist(58, 8, 48),
            disk: seedHist(28, 1.2, 48),
            netIn: seedHist(40, 30, 48, 260),
            netOut: seedHist(22, 22, 48, 260),
            cores: 12,
            ramTotal: 16,
            diskTotal: 512,
          },
          sys: {
            hostname: "node-01",
            os: "Ubuntu 24.04.1 LTS",
            kernel: "6.8.0-31-generic",
            arch: "x86_64",
            cpu: "AMD Ryzen 9 7900",
            cores: 12,
            ram: "16 GB",
            uptime: "23d 4h 11m",
            docker: "27.1.1",
          },
          projects: [
            {
              id: "storefront",
              name: "storefront",
              envs: [
                { id: "production", name: "production", apps: [sfw, sfa, sfpg, sfr] },
                { id: "staging", name: "staging", apps: [sfsw, sfspg] },
              ],
            },
            { id: "analytics", name: "analytics", envs: [{ id: "production", name: "production", apps: [ang, anch, aning] }] },
            { id: "sandbox", name: "sandbox", envs: [] },
          ],
        };
      })();

      // ─── helpers ────────────────────────────────────────────────────────
      function eachApp(fn) {
        model.projects.forEach((p) => p.envs.forEach((e) => e.apps.forEach(fn)));
      }
      function findApp(id) {
        let f = null;
        eachApp((a) => {
          if (a.id === id) f = a;
        });
        return f;
      }
      function currentProject() {
        return model.projects.find((p) => p.id === state.route.projectId);
      }
      function currentEnv() {
        const p = currentProject();
        return p && p.envs.find((e) => e.id === state.route.envId);
      }
      function currentApp() {
        return findApp(state.route.appId);
      }
      function push(arr, v, max = 48) {
        arr.push(v);
        if (arr.length > max) arr.shift();
      }
      function rollup(apps) {
        if (!apps || !apps.length) return "stopped";
        const st = apps.map((a) => a.status);
        if (st.includes("failed") || st.includes("exited")) return "failed";
        if (st.includes("building") || st.includes("queued")) return "building";
        if (st.includes("deploying") || st.includes("restarting")) return "deploying";
        if (st.includes("running")) return "running";
        return "stopped";
      }
      function projectRollup(p) {
        let apps = [];
        p.envs.forEach((e) => {
          apps = apps.concat(e.apps);
        });
        return rollup(apps);
      }
      function imgOf(a) {
        return a.type === "git" ? a.repo : a.image || "";
      }
      function portsLabel(a) {
        if (!a.ports || !a.ports.length) return "No exposed ports";
        return a.ports.map((p) => p.host + ":" + p.container).join("  ");
      }
      function envOf(a) {
        let f = null;
        model.projects.forEach((p) =>
          p.envs.forEach((e) => {
            if (e.apps.includes(a)) f = e;
          }),
        );
        return f;
      }
      function fmtNet(v) {
        return v >= 100 ? v.toFixed(0) : v.toFixed(1);
      }
      function fmtKB(v) {
        return v < 1000 ? v.toFixed(0) + " KB/s" : (v / 1000).toFixed(1) + " MB/s";
      }

      // ─── path helper (for SVG charts) ──────────────────────────────────
      function makePath(arr, w, h, max) {
        const n = arr.length,
          mx = max || Math.max(...arr.concat(1)) * 1.18;
        const pts = arr.map((v, i) => [(i / (n - 1)) * w, h - (Math.max(0, v) / mx) * h]);
        const line = "M" + pts.map((p) => p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" L");
        const area = line + " L" + w + " " + h + " L0 " + h + " Z";
        const last = pts[pts.length - 1];
        return { line, area, lastX: last[0].toFixed(1), lastY: last[1].toFixed(1) };
      }

      // ─── actions ───────────────────────────────────────────────────────
      function setState(patch) {
        if (typeof patch === "function") state = Object.assign({}, state, patch(state));
        else state = Object.assign({}, state, patch);
        scheduleRender();
      }
      function go(screen, ids = {}) {
        setState({
          route: Object.assign({ screen }, ids),
          userMenuOpen: false,
          drawerOpen: false,
          menuFor: null,
          loading: true,
          appTab: ids.appTab || "overview",
        });
        clearTimeout(window._load);
        window._load = setTimeout(() => setState({ loading: false }), 430);
      }

      let toastId = 0;
      function toast(type, msg) {
        const id = "t" + toastId++;
        const map = { info: "#60a5fa", success: "#34d399", error: "#f87171", warn: "#fbbf24" };
        setState((s) => ({ toasts: [...(s.toasts || []), { id, type, msg, color: map[type] || "#fb923c", spin: type === "info", dot: type !== "info" }] }));
        setTimeout(() => setState((s) => ({ toasts: (s.toasts || []).filter((t) => t.id !== id) })), 3400);
      }
      function setStatus(a, st) {
        a.status = st;
        setState((s) => ({ tick: s.tick + 1 }));
      }
      function startApp(a) {
        setStatus(a, "running");
        for (let i = 0; i < 6; i++) a.logs.push(mkLog(a));
        toast("success", "Started " + a.name);
      }
      function stopApp(a) {
        a.cpuHist = a.cpuHist.map(() => 0);
        setStatus(a, "stopped");
        toast("success", "Stopped " + a.name);
      }
      function restartApp(a) {
        toast("info", "Restarting " + a.name + "…");
        setStatus(a, "restarting");
        clearTimeout(a._t);
        a._t = setTimeout(() => {
          setStatus(a, "running");
          toast("success", "Restarted " + a.name);
        }, 1600);
      }

      function buildScript(a) {
        const sha = Math.random().toString(16).slice(2, 9);
        if (a.type === "git")
          return [
            { t: "Cloning " + a.repo + " (" + a.branch + ")", k: "info", phase: "Build", d: 500 },
            { t: "Checked out " + sha, k: "dim", d: 300 },
            { t: "Step 1/6 : FROM node:20-alpine", k: "dim", d: 380 },
            { t: "Step 2/6 : WORKDIR /app", k: "dim", d: 260 },
            { t: "Step 3/6 : COPY package*.json ./", k: "dim", d: 300 },
            { t: "Step 4/6 : RUN npm ci", k: "dim", d: 520 },
            { t: "added 642 packages in 18s", k: "info", d: 500 },
            { t: "Step 5/6 : COPY . .", k: "dim", d: 300 },
            { t: "Step 6/6 : RUN npm run build", k: "dim", d: 520 },
            { t: "✓ build complete (4.2 MB)", k: "ok", d: 400 },
            { t: "Pushing image storefront/" + a.name + ":" + sha, k: "info", phase: "Deploy", d: 460 },
            { t: "Stopping previous container", k: "dim", d: 340 },
            { t: "Starting " + a.container, k: "info", d: 420 },

      // ─── TOPBAR ─────────────────────────────────────────────────────────
      function renderTopbar(V) {
        const { screen, isMobile } = V;
        const crumbs = [];
        const sep = () => {
          if (crumbs.length) crumbs.push({ sep: true });
        };
        if (screen === "dashboard") {
          crumbs.push({ label: "Dashboard", color: "var(--text-body)", cursor: "default", weight: "600", font: "inherit" });
        } else {
          crumbs.push({ label: "Projects", color: "var(--text-secondary)", cursor: "pointer", weight: "500", font: "inherit", go: () => go("projects") });
          const p = currentProject();
          if (p) {
            sep();
            crumbs.push({
              label: p.name,
              color: screen === "project" ? "var(--text-body)" : "var(--text-secondary)",
              cursor: screen === "project" ? "default" : "pointer",
              weight: screen === "project" ? "600" : "500",
              font: "'Geist Mono'",
              go: screen === "project" ? null : () => go("project", { projectId: p.id }),
            });
          }
          const e = currentEnv();
          if (e) {
            sep();
            crumbs.push({
              label: e.name,
              color: screen === "environment" ? "var(--text-body)" : "var(--text-secondary)",
              cursor: screen === "environment" ? "default" : "pointer",
              weight: screen === "environment" ? "600" : "500",
              font: "'Geist Mono'",
              go: screen === "environment" ? null : () => go("environment", { projectId: p.id, envId: e.id }),
            });
          }
          const a = currentApp();
          if (a && screen === "app") {
            sep();
            crumbs.push({ label: a.name, color: "var(--text-body)", cursor: "default", weight: "600", font: "'Geist Mono'" });
          }
        }
        const themeIcon = state.theme === "light" ? "☾" : "☀";
        const themeTitle = state.theme === "light" ? "Switch to dark mode" : "Switch to light mode";
        return `<header style="height:56px;flex:none;display:flex;align-items:center;gap:12px;padding:0 16px 0 14px;border-bottom:1px solid var(--border-main);background:var(--topbar);backdrop-filter:blur(10px);z-index:15">
  ${isMobile ? `<div ${h(() => setState({ drawerOpen: true }))} style="width:34px;height:34px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;color:var(--text-secondary);font-family:'Geist Mono';font-size:16px" data-hov="background:var(--surface-hover)">≡</div>` : ""}
  <nav style="flex:1;min-width:0;display:flex;align-items:center;gap:7px;font-size:13.5px;overflow:hidden">
    ${crumbs
      .map((c) => {
        if (c.sep) return `<span style="color:var(--text-ghost);font-family:'Geist Mono';font-size:12px;flex:none">/</span>`;

    ${
      !isMobile || screen === "dashboard"
        ? `<div style="display:flex;align-items:center;gap:8px;height:30px;padding:0 11px;background:var(--surface-card);border:1px solid var(--border-main);border-radius:7px">
      <span style="position:relative;width:7px;height:7px;flex:none"><span style="position:absolute;inset:0;border-radius:50%;background:#34d399"></span><span style="position:absolute;inset:0;border-radius:50%;background:#34d399;animation:ringPulse 2.4s ease-out infinite"></span></span>

    </div>`
        : ""
    }
  </div>
</header>`;
      }

      // ─── DASHBOARD ──────────────────────────────────────────────────────
      function renderDashboard(V) {
        const h2 = model.host;
        const cur = (arr) => arr[arr.length - 1];
        const ramUsed = (cur(h2.ram) / 100) * h2.ramTotal;
        const diskUsed = (cur(h2.disk) / 100) * h2.diskTotal;
        const metricCards = [
          {
            id: "cpu",
            label: "CPU",
            unit: "%",
            value: cur(h2.cpu).toFixed(0),
            sub: "/ " + h2.cores + " cores",
            pct: cur(h2.cpu).toFixed(0),
            color: "#fb923c",
            arr: h2.cpu,
            max: 100,
          },
          {
            id: "ram",
            label: "Memory",
            unit: "GB",
            value: ramUsed.toFixed(1),
            sub: "/ " + h2.ramTotal,
            pct: cur(h2.ram).toFixed(0),
            color: "#34d399",
            arr: h2.ram,
            max: 100,
          },
          {
            id: "disk",
            label: "Disk",
            unit: "GB",
            value: diskUsed.toFixed(0),
            sub: "/ " + h2.diskTotal,
            pct: cur(h2.disk).toFixed(0),
            color: "#a78bfa",
            arr: h2.disk,
            max: 100,
          },
          {
            id: "net",
            label: "Network",
            unit: "MB/s",
            value: fmtNet(cur(h2.netIn)),
            sub: "↓ in",
            pct: Math.min(100, cur(h2.netIn) / 2.6).toFixed(0),
            color: "#60a5fa",
            arr: h2.netIn,
            max: 260,
          },
        ].map((c) => {
          const p = makePath(c.arr, 220, 38, c.max);
          return Object.assign(c, p);
        });

        let totalProjects = model.projects.length,
          runningProjects = 0,
          totalEnvs = 0,
          totalApps = 0,
          runningApps = 0,
          attention = 0;
        let allDeploys = [];
        model.projects.forEach((p) => {
          if (projectRollup(p) === "running") runningProjects++;
          totalEnvs += p.envs.length;
          p.envs.forEach((e) => {
            e.apps.forEach((a) => {
              totalApps++;
              if (a.status === "running") runningApps++;
              if (a.status === "failed" || a.status === "exited") attention++;
              (a.deployments || []).forEach((d) => allDeploys.push({ d, app: a.name, proj: p.name, env: e.name, projectId: p.id, envId: e.id, appId: a.id }));
            });
          });
        });
        const monIdx = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
        const keyOf = (s2) => {
          const mm = (s2 || "").match(/(\w+)\s+(\d+)\s+(\d+):(\d+)/);
          if (!mm) return 0;
          return (monIdx[mm[1]] || 0) * 1e6 + +mm[2] * 1e4 + +mm[3] * 100 + +mm[4];
        };
        allDeploys.sort((a, b) => keyOf(b.d.started) - keyOf(a.d.started));
        const recent = allDeploys.slice(0, 5);

        const statCards = [
          {
            label: "Projects",
            value: String(totalProjects),
            sub: runningProjects + " running",
            icon: "⬡",
            iconColor: "var(--text-tertiary)",
            subColor: "var(--text-tertiary)",
          },
          {
            label: "Applications",
            value: String(totalApps),
            sub: runningApps + " running",
            icon: "❒",
            iconColor: "var(--text-tertiary)",
            subColor: runningApps > 0 ? "#34d399" : "var(--text-tertiary)",
          },
          {
            label: "Environments",
            value: String(totalEnvs),
            sub: "across host",
            icon: "◳",
            iconColor: "var(--text-tertiary)",
            subColor: "var(--text-tertiary)",
          },
          {
            label: "Needs attention",
            value: String(attention),
            sub: attention === 0 ? "all healthy" : "failed / exited",
            icon: "!",
            iconColor: attention > 0 ? "#f87171" : "#34d399",
            subColor: attention > 0 ? "#f87171" : "var(--text-tertiary)",
          },
        ];
        const sysinfo = [
          { k: "Hostname", v: model.sys.hostname },
          { k: "OS", v: model.sys.os },
          { k: "Kernel", v: model.sys.kernel },
          { k: "Architecture", v: model.sys.arch },
          { k: "CPU", v: model.sys.cpu },
          { k: "Cores", v: model.sys.cores + " vCPU" },
          { k: "Total memory", v: model.sys.ram },
          { k: "Uptime", v: model.sys.uptime },
          { k: "Docker", v: "v" + model.sys.docker },
        ];
        const isMobile = V.isMobile,
          isTablet = V.isTablet;
        const metricCols = isMobile ? "1fr 1fr" : "repeat(4,1fr)";
        const chartCols = isMobile || isTablet ? "1fr" : "1fr calc((100% - 42px) / 4)";
        return `<div style="width:100%;padding:${V.pagePad}">
  <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap">
    <div>
      <h1 style="font-size:21px;font-weight:600;letter-spacing:-.02em">Host monitor</h1>
      <p style="font-size:13.5px;color:var(--text-secondary);margin-top:4px">Live resource usage for <span style="font-family:'Geist Mono';color:var(--text-body)">node-01</span> · refreshed every second</p>
    </div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-tertiary);font-family:'Geist Mono'">
      <span style="position:relative;width:6px;height:6px"><span style="position:absolute;inset:0;border-radius:50%;background:#34d399"></span><span style="position:absolute;inset:0;border-radius:50%;background:#34d399;animation:ringPulse 2.4s ease-out infinite"></span></span>live
    </div>
  </div>
  <div style="display:grid;grid-template-columns:${metricCols};gap:14px;margin-bottom:16px">
    ${metricCards
      .map(
        (
          m,
        ) => `<div style="background:var(--surface-card);border:1px solid var(--border-main);border-radius:10px;padding:15px 16px 12px;transition:border-color .15s" data-hov="border-color:var(--border-input)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
        <span style="font-size:12px;color:var(--text-secondary);font-weight:500;letter-spacing:.01em">${m.label}</span>
        <span style="font-family:'Geist Mono';font-size:10.5px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em">${m.unit}</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <span style="font-family:'Geist Mono';font-size:25px;font-weight:500;letter-spacing:-.02em;color:var(--text-body);font-variant-numeric:tabular-nums">${m.value}</span>
        <span style="font-family:'Geist Mono';font-size:13px;color:var(--text-tertiary)">${m.sub}</span>
      </div>
      <svg viewBox="0 0 220 38" preserveAspectRatio="none" style="width:100%;height:34px;margin-top:8px;display:block">
        <defs><linearGradient id="g-${m.id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${m.color}" stop-opacity="0.22"/><stop offset="1" stop-color="${m.color}" stop-opacity="0"/></linearGradient></defs>
        <path d="${m.area}" fill="url(#g-${m.id})"/><path d="${m.line}" fill="none" stroke="${m.color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${m.lastX}" cy="${m.lastY}" r="2.4" fill="${m.color}"/>
      </svg>
      <div style="margin-top:9px;height:4px;border-radius:3px;background:var(--bg);overflow:hidden"><div style="height:100%;width:${m.pct}%;background:${m.color};border-radius:3px;transition:width .9s linear"></div></div>
    </div>`,
      )
      .join("")}
  </div>
  <div style="display:grid;grid-template-columns:${chartCols};gap:16px;align-items:start">
    <div style="display:flex;flex-direction:column;gap:16px;min-width:0">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:14px">
        ${statCards
          .map(
            (
              st,
            ) => `<div style="background:var(--surface-card);border:1px solid var(--border-main);border-radius:11px;padding:16px 17px;display:flex;flex-direction:column;gap:12px;transition:border-color .15s" data-hov="border-color:var(--border-input)">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:12px;color:var(--text-secondary);font-weight:500;letter-spacing:.01em">${st.label}</span>
            <span style="font-family:'Geist Mono';font-size:13px;color:${st.iconColor}">${st.icon}</span>
          </div>
          <div style="display:flex;align-items:baseline;gap:7px">
            <span style="font-family:'Geist Mono';font-size:28px;font-weight:500;letter-spacing:-.02em;color:var(--text-primary);font-variant-numeric:tabular-nums;line-height:1">${st.value}</span>
            <span style="font-size:12.5px;color:${st.subColor}">${st.sub}</span>
          </div>
        </div>`,
          )
          .join("")}
      </div>
      <div style="background:var(--surface-card);border:1px solid var(--border-main);border-radius:11px;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--border-main)">
          <span style="font-size:13.5px;font-weight:600">Recent deployments</span>
          <span style="font-size:11.5px;color:var(--text-tertiary);font-family:'Geist Mono'">last ${recent.length}</span>
        </div>
        ${recent.length === 0 ? `<div style="padding:18px 16px;font-size:12.5px;color:var(--text-tertiary)">No deployments yet.</div>` : ""}
        ${recent
          .map((x) => {
            const ds = sdStatus(x.d.status);
            return `<div ${h(() => go("app", { projectId: x.projectId, envId: x.envId, appId: x.appId, appTab: "deployments" }))} style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border-inner);cursor:pointer;transition:background .14s" data-hov="background:var(--surface-inset)">
          ${statusDot(ds.color, ds.anim)}
          <div style="display:flex;flex-direction:column;gap:3px;min-width:0;flex:1">
            <div style="display:flex;align-items:center;gap:7px;min-width:0">
              <span style="font-family:'Geist Mono';font-size:13px;font-weight:500;color:var(--text-body);white-space:nowrap">${x.app}</span>
              <span style="font-size:11.5px;color:var(--text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x.proj} / ${x.env}</span>
            </div>
            <span style="font-family:'Geist Mono';font-size:11px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x.d.tag} · ${x.d.trigger}</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex:none">
            <span style="font-size:11.5px;font-weight:500;color:${ds.color}">${ds.label}</span>
            <span style="font-family:'Geist Mono';font-size:11px;color:var(--text-faint)">${x.d.started}</span>
          </div>
        </div>`;
          })
          .join("")}
      </div>
    </div>
    <div style="background:var(--surface-card);border:1px solid var(--border-main);border-radius:11px;overflow:hidden;min-width:0">
      <div style="padding:14px 16px 12px;border-bottom:1px solid var(--border-main)"><span style="font-size:13.5px;font-weight:600">System</span><span style="font-size:11.5px;color:var(--text-tertiary);margin-left:8px">static info</span></div>
      ${sysinfo
        .map(
          (
            row,
          ) => `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border-inner)">
        <span style="font-size:12.5px;color:var(--text-secondary);flex:none">${row.k}</span>
        <span style="font-family:'Geist Mono';font-size:12.5px;color:var(--text-body);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.v}</span>
      </div>`,
        )
        .join("")}
    </div>
  </div>
</div>`;
      }

      // ─── PROJECTS ───────────────────────────────────────────────────────

      ${state.neErr ? `<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#f87171;margin-top:7px"><span style="width:4px;height:4px;border-radius:50%;background:#f87171"></span>${state.neErr}</div>` : ""}
      <div style="display:flex;align-items:center;justify-content:flex-end;gap:9px;margin-top:22px">
        <button ${h(() => setState({ newEnvOpen: false }))} style="height:36px;padding:0 15px;background:var(--surface-card);border:1px solid var(--border-input);color:var(--text-body);font-weight:500;font-size:13px;border-radius:8px;cursor:pointer" data-hov="border-color:var(--border-strong)">Cancel</button>
        <button ${h(() => createEnv())} style="height:36px;padding:0 16px;background:#fb923c;color:var(--on-accent);font-weight:600;font-size:13px;border:none;border-radius:8px;cursor:pointer" data-hov="background:#fdac6b">Create environment</button>
      </div>
    </div>
  </div>`;
        }

        // ── Confirm ──
        if (state.confirm) {
          const c = state.confirm;
          out += `<div ${h(() => setState({ confirm: null }))} style="${overlayStyle}">
    <div ${h((ev) => ev && ev.stopPropagation && ev.stopPropagation())} style="${dlgCardStyle}">
      <div style="display:flex;align-items:flex-start;gap:13px">
        <div style="width:34px;height:34px;flex:none;border-radius:9px;background:rgba(248,113,113,.12);display:flex;align-items:center;justify-content:center;color:#f87171;font-family:'Geist Mono';font-size:16px">⚠</div>
        <div style="min-width:0"><div style="font-size:15.5px;font-weight:600;letter-spacing:-.01em;margin-bottom:5px">${c.title}</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.5">${c.body}</div></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:flex-end;gap:9px;margin-top:22px">
        <button ${h(() => setState({ confirm: null }))} style="height:36px;padding:0 15px;background:var(--surface-card);border:1px solid var(--border-input);color:var(--text-body);font-weight:500;font-size:13px;border-radius:8px;cursor:pointer" data-hov="border-color:var(--border-strong)">Cancel</button>
        <button ${h(() => {
          if (c.onConfirm) c.onConfirm();
        })} style="height:36px;padding:0 15px;background:${c.danger ? "#f87171" : "#fb923c"};color:var(--on-accent);font-weight:600;font-size:13px;border:none;border-radius:8px;cursor:pointer" data-hov="filter:brightness(1.08)">${c.confirmLabel || "Confirm"}</button>
      </div>
    </div>
  </div>`;
        }

        // ── Build Drawer ──
        const bd = state.buildDrawer;
        if (bd) {
          const cm = { info: "var(--text-secondary)", dim: "var(--text-tertiary)", ok: "#34d399", err: "#f87171" };
          const barColor = bd.done ? "#34d399" : "#60a5fa";
          out += `<div ${h(() => setState({ buildDrawer: null }))} style="position:fixed;inset:0;z-index:75;background:rgba(5,5,7,.5)"></div>
    <div style="position:fixed;top:0;right:0;bottom:0;z-index:80;width:${isMob ? "100%" : "min(540px,100%)"};background:var(--surface-inset);border-left:1px solid var(--border-input);display:flex;flex-direction:column;animation:drawerIn .26s cubic-bezier(.2,.7,.3,1) both;box-shadow:-20px 0 60px -20px rgba(0,0,0,.6)">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border-main);flex:none">
        <div style="display:flex;align-items:center;gap:10px;min-width:0">
          <span style="position:relative;width:8px;height:8px;flex:none"><span style="position:absolute;inset:0;border-radius:50%;background:${barColor}"></span><span style="position:absolute;inset:0;border-radius:50%;background:${barColor};animation:ringPulse 1.8s ease-out infinite"></span></span>
          <div style="min-width:0"><div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px">Deploying <span style="font-family:'Geist Mono';color:var(--text-secondary)">${bd.appName}</span></div></div>
        </div>
        <div ${h(() => setState({ buildDrawer: null }))} style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;color:var(--text-secondary);font-family:'Geist Mono';font-size:16px" data-hov="background:var(--surface-raised);color:var(--text-body)">✕</div>
      </div>
      <div style="padding:14px 18px 10px;flex:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:var(--text-secondary)">${bd.phase}</span><span style="font-family:'Geist Mono';font-size:12px;color:var(--text-secondary)">${bd.pct}%</span></div>
        <div style="height:5px;border-radius:3px;background:var(--surface-card);overflow:hidden"><div style="height:100%;width:${bd.pct}%;background:${barColor};border-radius:3px;transition:width .4s ease"></div></div>
      </div>
      <div id="build-scroll" style="flex:1;overflow-y:auto;padding:8px 18px 18px;font-family:'Geist Mono';font-size:12px;line-height:1.75">
        ${bd.lines.map((l) => `<div style="display:flex;gap:10px"><span style="color:var(--text-ghost);flex:none">$</span><span style="color:${cm[l.k] || "var(--text-secondary)"};word-break:break-word">${l.t}</span></div>`).join("")}
        ${bd.done ? `<div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding:9px 11px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.22);border-radius:8px;color:#34d399;font-family:'Geist';font-size:12.5px"><span>✓</span>Deployment finished</div>` : ""}
      </div>
    </div>`;
        }

        // ── Toasts ──
        if (state.toasts && state.toasts.length) {
          out += `<div style="position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:9px;z-index:90;pointer-events:none">
    ${state.toasts
      .map(
        (
          t,
        ) => `<div style="display:flex;align-items:center;gap:10px;min-width:230px;max-width:340px;padding:11px 13px;background:var(--surface-raised);border:1px solid var(--border-input);border-left:3px solid ${t.color};border-radius:9px;box-shadow:0 14px 34px -10px rgba(0,0,0,.7);animation:toastIn .2s ease-out both;pointer-events:auto">
      ${t.spin ? `<span style="width:13px;height:13px;flex:none;border:2px solid ${t.color};border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite"></span>` : ""}
      ${t.dot ? `<span style="width:7px;height:7px;flex:none;border-radius:50%;background:${t.color}"></span>` : ""}
      <span style="font-size:13px;color:var(--text-body);flex:1">${t.msg}</span>
    </div>`,
      )
      .join("")}
  </div>`;
        }

        return out;
      }

      // ─── MAIN RENDER ────────────────────────────────────────────────────
      let _raf = null;
      function scheduleRender() {
        if (!_raf) _raf = requestAnimationFrame(doRender);
      }
      function doRender() {
        _raf = null;
        // Reset handler registry
        Object.keys(H).forEach((k) => delete H[k]);
        _hi = 0;

        const W = state.width;
        const isMobile = W < 768,
          isTablet = W >= 768 && W < 1280;
        const V = {
          screen: state.route.screen,
          isMobile,
          isTablet,
          width: W,
          expanded: !state.sidebarCollapsed && !isTablet && !isMobile,
          pagePad: isMobile ? "18px 14px 40px" : "26px 30px 48px",
        };

        let html = "";
        if (state.view === "setup") {
          html = renderSetup();
        } else if (state.view === "login") {
          html = renderLogin();
        } else {
          const expanded = V.expanded;
          html = `<div style="display:flex;height:100vh;width:100vw;overflow:hidden;background:var(--bg)">
    ${!isMobile ? renderSidebar(V) : ""}
    ${renderMobileDrawer()}
    <div style="flex:1;display:flex;flex-direction:column;min-width:0;height:100vh">
      ${renderTopbar(V)}
      <main style="flex:1;overflow-y:auto;overflow-x:hidden;position:relative">
        ${
          state.loading && V.screen !== "app"
            ? `<div style="position:absolute;inset:0;background:var(--bg);z-index:6">
          <div style="width:100%;padding:${V.pagePad}">
            <div class="skel" style="width:190px;height:24px;margin-bottom:10px"></div>
            <div class="skel" style="width:300px;height:14px;margin-bottom:26px;opacity:.6"></div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px">
              <div class="skel" style="height:118px"></div><div class="skel" style="height:118px"></div><div class="skel" style="height:118px"></div><div class="skel" style="height:118px"></div>
            </div>
          </div>
        </div>`
            : ""
        }
        ${V.screen === "dashboard" ? renderDashboard(V) : ""}
        ${V.screen === "projects" ? renderProjects(V) : ""}
        ${V.screen === "project" ? renderProjectDetail(V) : ""}
        ${V.screen === "environment" ? renderEnvDetail(V) : ""}
        ${V.screen === "app" ? renderAppDetail(V) : ""}
      </main>
    </div>
    ${renderOverlays(V)}
  </div>`;
        }

        document.getElementById("root").innerHTML = html;

        // scroll log to bottom
        if (state.view === "app" && state.route.screen === "app" && state.appTab === "logs" && state.logsFollow) {
          const el = document.getElementById("log-scroll");
          if (el) el.scrollTop = el.scrollHeight;
        }
        // scroll build log to bottom
        if (state.buildDrawer) {
          const el = document.getElementById("build-scroll");
          if (el) el.scrollTop = el.scrollHeight;
        }
      }

      // ─── INIT ────────────────────────────────────────────────────────────
      try {
        const t = localStorage.getItem("helmsman-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
        state.theme = t;
      } catch (e) {}
      doRender();
    </script>
  </body>
</html>
